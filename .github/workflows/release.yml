name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Build in a Debian Trixie container: it ships libadwaita 1.7+ (required by the
    # gotk4-adwaita bindings) and glibc 2.41, the lowest floor that still satisfies
    # the binding. nfpm emits both .deb and .rpm from the resulting binary, which
    # then runs on Debian 13+, Ubuntu 25.04+, and current Fedora (glibc >= 2.41).
    container: debian:trixie
    timeout-minutes: 30
    permissions:
      contents: write
      # Required for cosign keyless signing: the OIDC token attests the
      # workflow identity in the signature certificate.
      id-token: write
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git gcc pkg-config ca-certificates curl gettext-base \
            libgtk-4-dev libadwaita-1-dev libsecret-1-dev gobject-introspection

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Fix git permissions
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # syft generates the SBOMs declared in .goreleaser.yaml
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # cosign signs the checksum file (keyless, see signs in .goreleaser.yaml)
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-nixpkgs:
    needs: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Update nixpkgs
        uses: shini4i/nixpkgs-updater@v1
        with:
          package-name: openfortivpn-gui
          version: ${{ github.ref_name }}
          target-repo: shini4i/nixpkgs
          github-token: ${{ secrets.NIXPKGS_TOKEN }}
